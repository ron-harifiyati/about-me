<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Ron Harifiyati</title>
  <link rel="stylesheet" href="/assets/css/theme.css">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="icon" href="/assets/images/favicon.svg" type="image/svg+xml">
  <style>
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--bg-alt);
      border-right: 1px solid var(--border);
      padding: 1.5rem 1rem;
    }
    .admin-sidebar h2 { font-size: 1rem; margin-bottom: 1.5rem; color: var(--text-muted); }
    .admin-sidebar a {
      display: block; padding: 0.5rem 0.75rem;
      border-radius: 6px; margin-bottom: 0.25rem;
      color: var(--text-muted); font-size: 0.9rem;
    }
    .admin-sidebar a:hover, .admin-sidebar a.active {
      background: var(--accent); color: #fff; text-decoration: none;
    }
    .admin-content { flex: 1; padding: 2rem; overflow-y: auto; }
  </style>
</head>
<body>
  <div x-data="adminApp()" x-init="init()">

    <!-- Auth guard -->
    <template x-if="!isAdmin && !loading">
      <div style="text-align: center; padding: 4rem;">
        <h1>Access denied</h1>
        <p class="subtitle">Admin access required.</p>
        <a href="/index.html#/login" class="btn btn-primary" style="display: inline-block; margin-top: 1rem;">Log in</a>
      </div>
    </template>

    <div x-show="loading" class="loading-center" style="height: 100vh;"><div class="spinner"></div></div>

    <template x-if="isAdmin">
      <div class="admin-layout">

        <!-- Sidebar -->
        <aside class="admin-sidebar">
          <h2>Admin Panel</h2>
          <a href="#/dashboard"    :class="{ active: section === 'dashboard' }"    @click.prevent="section='dashboard'">Dashboard</a>
          <a href="#/analytics"    :class="{ active: section === 'analytics' }"    @click.prevent="section='analytics'">Analytics</a>
          <a href="#/content"      :class="{ active: section === 'content' }"      @click.prevent="section='content'">Content</a>
          <a href="#/users"        :class="{ active: section === 'users' }"        @click.prevent="section='users'">Users</a>
          <a href="#/contacts"     :class="{ active: section === 'contacts' }"     @click.prevent="section='contacts'">Contacts</a>
          <a href="#/testimonials" :class="{ active: section === 'testimonials' }" @click.prevent="section='testimonials'">Testimonials</a>
          <a href="#/projects"     :class="{ active: section === 'projects' }"     @click.prevent="section='projects'">Projects</a>
          <a href="#/courses"      :class="{ active: section === 'courses' }"      @click.prevent="section='courses'">Courses</a>
          <a href="#/comments"     :class="{ active: section === 'comments' }"     @click.prevent="section='comments'">Comments</a>
          <a href="#/guestbook"    :class="{ active: section === 'guestbook' }"    @click.prevent="section='guestbook'">Guestbook</a>
          <a href="#/quiz"         :class="{ active: section === 'quiz' }"         @click.prevent="section='quiz'">Quiz</a>
          <hr style="border: none; border-top: 1px solid var(--border); margin: 1rem 0;">
          <a href="/index.html" style="color: var(--text-muted);">&larr; Back to site</a>
        </aside>

        <!-- Main content area -->
        <main class="admin-content">

          <!-- Dashboard -->
          <div x-show="section === 'dashboard'">
            <h1>Dashboard</h1>
            <p class="subtitle">Welcome back, <span x-text="user?.name"></span>.</p>
            <div class="card-grid" style="margin-top: 1.5rem; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));">
              <div class="card" style="text-align: center; cursor: pointer;" @click="section='users'">
                <div style="font-size: 2rem;" x-text="stats.users || '—'"></div>
                <p class="subtitle">Users</p>
              </div>
              <div class="card" style="text-align: center; cursor: pointer;" @click="section='contacts'">
                <div style="font-size: 2rem;" x-text="stats.contacts || '—'"></div>
                <p class="subtitle">Contacts</p>
              </div>
              <div class="card" style="text-align: center; cursor: pointer;" @click="section='testimonials'">
                <div style="font-size: 2rem;" x-text="stats.pending_testimonials || '—'"></div>
                <p class="subtitle">Pending testimonials</p>
              </div>
            </div>
          </div>

          <!-- Analytics -->
          <div x-show="section === 'analytics'" x-data="adminAnalytics()" x-init="init()">
            <h1>Analytics</h1>
            <div x-show="loading" class="loading-center" style="margin-top: 2rem;"><div class="spinner"></div></div>
            <template x-if="!loading && data">
              <div>
                <!-- Summary cards -->
                <div class="card-grid" style="margin-top: 1.25rem; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));">
                  <div class="card" style="text-align: center;">
                    <div style="font-size: 2rem; font-weight: 700;" x-text="data.unique_visitors"></div>
                    <p class="subtitle">Unique visitors</p>
                  </div>
                  <div class="card" style="text-align: center;">
                    <div style="font-size: 2rem; font-weight: 700;" x-text="data.total_pageviews"></div>
                    <p class="subtitle">Total page views</p>
                  </div>
                  <div class="card" style="text-align: center;">
                    <div style="font-size: 2rem; font-weight: 700;" x-text="data.locations?.length || 0"></div>
                    <p class="subtitle">Mapped locations</p>
                  </div>
                </div>

                <!-- Page breakdown -->
                <div class="card" style="margin-top: 1.5rem;">
                  <h3 style="margin-bottom: 1rem;">Views by page</h3>
                  <template x-if="pageRows.length === 0"><p class="subtitle">No page view data yet.</p></template>
                  <template x-for="row in pageRows" :key="row.page">
                    <div style="margin-bottom: 0.75rem;">
                      <div style="display: flex; justify-content: space-between; margin-bottom: 0.25rem;">
                        <span style="font-size: 0.9rem; text-transform: capitalize;" x-text="row.page"></span>
                        <span class="subtitle" style="font-size: 0.85rem;" x-text="row.count + ' (' + pct(row.count) + '%)'"></span>
                      </div>
                      <div style="height: 6px; background: var(--border); border-radius: 3px;">
                        <div :style="{ width: pct(row.count) + '%', height: '6px', borderRadius: '3px', background: 'var(--accent)', transition: 'width 0.3s' }"></div>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>
            <template x-if="!loading && !data">
              <p class="subtitle" style="margin-top: 1.5rem;">No analytics data available.</p>
            </template>
          </div>

          <!-- Content editor -->
          <div x-show="section === 'content'" x-data="adminContent()" x-init="init()">
            <h1>Content</h1>
            <div style="display: flex; gap: 0.5rem; margin: 1rem 0; flex-wrap: wrap;">
              <button class="btn btn-sm" :class="activeTab==='about'?'btn-primary':'btn-outline'" @click="activeTab='about'">About</button>
              <button class="btn btn-sm" :class="activeTab==='skills'?'btn-primary':'btn-outline'" @click="activeTab='skills'">Skills (JSON)</button>
              <button class="btn btn-sm" :class="activeTab==='fun-facts'?'btn-primary':'btn-outline'" @click="activeTab='fun-facts'">Fun Facts</button>
              <button class="btn btn-sm" :class="activeTab==='learning'?'btn-primary':'btn-outline'" @click="activeTab='learning'">Currently Learning</button>
            </div>
            <div x-show="success" class="alert alert-success" x-text="success"></div>

            <!-- About tab -->
            <div x-show="activeTab === 'about'" class="card">
              <div class="form-group"><label>Bio</label><textarea x-model="about.bio" class="form-input" rows="5"></textarea></div>
              <div class="form-group"><label>Mission</label><input x-model="about.mission" class="form-input"></div>
              <button class="btn btn-primary" @click="save('about', about)" :disabled="saving">
                <span x-text="saving ? 'Saving...' : 'Save'"></span>
              </button>
            </div>

            <!-- Skills tab -->
            <div x-show="activeTab === 'skills'" class="card">
              <p class="subtitle" style="margin-bottom: 0.75rem;">Edit as JSON. Format: {"languages": ["Python", "JS"], "tools": ["AWS", "Docker"]}</p>
              <textarea class="form-input" rows="10"
                        :value="JSON.stringify(skills, null, 2)"
                        @input="try { skills = JSON.parse($event.target.value) } catch(e) {}"></textarea>
              <button class="btn btn-primary" style="margin-top: 0.75rem;" @click="save('skills', skills)" :disabled="saving">
                <span x-text="saving ? 'Saving...' : 'Save'"></span>
              </button>
            </div>

            <!-- Fun facts tab -->
            <div x-show="activeTab === 'fun-facts'" class="card">
              <p class="subtitle" style="margin-bottom: 0.75rem;">One fact per line.</p>
              <textarea class="form-input" rows="8"
                        :value="funFacts.facts.join('\n')"
                        @input="funFacts.facts = $event.target.value.split('\n').filter(Boolean)"></textarea>
              <button class="btn btn-primary" style="margin-top: 0.75rem;" @click="save('fun-fact', funFacts)" :disabled="saving">
                <span x-text="saving ? 'Saving...' : 'Save'"></span>
              </button>
            </div>

            <!-- Currently learning tab -->
            <div x-show="activeTab === 'learning'" class="card">
              <p class="subtitle" style="margin-bottom: 0.75rem;">Items shown in the ticker. One per line.</p>
              <textarea class="form-input" rows="6"
                        :value="(currentlyLearning.items || []).join('\n')"
                        @input="currentlyLearning.items = $event.target.value.split('\n').filter(Boolean)"></textarea>
              <button class="btn btn-primary" style="margin-top: 0.75rem;" @click="save('currently-learning', currentlyLearning)" :disabled="saving">
                <span x-text="saving ? 'Saving...' : 'Save'"></span>
              </button>
            </div>
          </div>

          <!-- Users -->
          <div x-show="section === 'users'" x-data="adminUsers()" x-init="init()">
            <h1>Users</h1>
            <div x-show="loading" class="loading-center"><div class="spinner"></div></div>
            <template x-if="!loading">
              <div style="margin-top: 1rem;">
                <template x-if="users.length === 0"><p class="subtitle">No users yet.</p></template>
                <template x-for="u in users" :key="u.user_id">
                  <div class="card" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; flex-wrap: wrap; gap: 0.5rem;">
                    <div>
                      <strong x-text="u.name"></strong>
                      <span class="subtitle" style="margin-left: 0.5rem;" x-text="u.email"></span>
                      <span class="badge badge-outline" style="margin-left: 0.5rem;" x-text="u.identity"></span>
                      <span class="badge" style="margin-left: 0.25rem;" x-show="u.status && u.status !== 'active'"
                            :style="u.status === 'banned' ? 'background:#DC3545' : 'background:#FFC107; color:#212529'"
                            x-text="u.status"></span>
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                      <button class="btn btn-outline btn-sm" @click="setStatus(u.user_id, 'suspended')"
                              x-show="u.status !== 'suspended'">Suspend</button>
                      <button class="btn btn-outline btn-sm" @click="setStatus(u.user_id, 'active')"
                              x-show="u.status === 'suspended'">Reinstate</button>
                      <button class="btn btn-danger btn-sm" @click="deleteUser(u.user_id)">Delete</button>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>

          <!-- Contacts -->
          <div x-show="section === 'contacts'" x-data="adminContacts()" x-init="init()">
            <h1>Contact Submissions</h1>
            <div x-show="loading" class="loading-center"><div class="spinner"></div></div>
            <template x-if="!loading">
              <div style="margin-top: 1rem;">
                <template x-if="contacts.length === 0"><p class="subtitle">No contact submissions.</p></template>
                <template x-for="c in contacts" :key="c.contact_id">
                  <div class="card" style="margin-bottom: 0.75rem;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem;">
                      <div style="flex: 1; min-width: 0;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.4rem;">
                          <strong x-text="c.name + ' <' + c.email + '>'"></strong>
                          <span class="subtitle" style="font-size: 0.8rem;" x-text="formatDate(c.created_at)"></span>
                        </div>
                        <p x-text="c.message"></p>
                      </div>
                      <button class="btn btn-danger btn-sm" style="flex-shrink: 0;"
                              @click="deleteContact(c)">Delete</button>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>

          <!-- Testimonials -->
          <div x-show="section === 'testimonials'" x-data="adminTestimonials()" x-init="init()">
            <h1>Testimonials</h1>
            <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
              <button class="btn btn-sm" :class="tab === 'pending' ? 'btn-primary' : 'btn-outline'" @click="tab = 'pending'">
                Pending <span x-show="pending.length > 0" x-text="'(' + pending.length + ')'"></span>
              </button>
              <button class="btn btn-sm" :class="tab === 'approved' ? 'btn-primary' : 'btn-outline'" @click="tab = 'approved'">
                Approved <span x-show="approved.length > 0" x-text="'(' + approved.length + ')'"></span>
              </button>
            </div>
            <div x-show="loading" class="loading-center" style="margin-top: 2rem;"><div class="spinner"></div></div>
            <template x-if="!loading">
              <div style="margin-top: 1rem;">
                <template x-if="tab === 'pending'">
                  <div>
                    <template x-if="pending.length === 0"><p class="subtitle">No pending testimonials.</p></template>
                    <template x-for="t in pending" :key="t.testimonial_id">
                      <div class="card" style="margin-bottom: 0.75rem;">
                        <p style="font-style: italic; margin-bottom: 0.75rem;" x-text="'\u201c' + t.body + '\u201d'"></p>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                          <div>
                            <strong x-text="t.author"></strong>
                            <span class="badge badge-outline" style="margin-left: 0.5rem;" x-text="t.identity"></span>
                          </div>
                          <div style="display: flex; gap: 0.5rem;">
                            <button class="btn btn-primary btn-sm" @click="action(t.testimonial_id, 'approve')">Approve</button>
                            <button class="btn btn-danger btn-sm" @click="action(t.testimonial_id, 'reject')">Reject</button>
                          </div>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
                <template x-if="tab === 'approved'">
                  <div>
                    <template x-if="approved.length === 0"><p class="subtitle">No approved testimonials.</p></template>
                    <template x-for="t in approved" :key="t.testimonial_id">
                      <div class="card" style="margin-bottom: 0.75rem;">
                        <p style="font-style: italic; margin-bottom: 0.75rem;" x-text="'\u201c' + t.body + '\u201d'"></p>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                          <div>
                            <strong x-text="t.author"></strong>
                            <span class="badge badge-outline" style="margin-left: 0.5rem;" x-text="t.identity"></span>
                          </div>
                          <button class="btn btn-danger btn-sm" @click="deleteApproved(t)">Remove</button>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>
          </div>

          <!-- Projects -->
          <div x-show="section === 'projects'" x-data="adminProjects()" x-init="init()">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <h1>Projects</h1>
              <button class="btn btn-primary btn-sm" @click="openCreate()">+ Add Project</button>
            </div>
            <div x-show="success" class="alert alert-success" style="margin-top: 1rem;" x-text="success"></div>

            <!-- Project list -->
            <div x-show="loading" class="loading-center" style="margin-top: 2rem;"><div class="spinner"></div></div>
            <template x-if="!loading">
              <div style="margin-top: 1.25rem;">
                <template x-if="projects.length === 0"><p class="subtitle">No projects yet.</p></template>
                <template x-for="p in projects" :key="p.id">
                  <div class="card" style="margin-bottom: 0.75rem;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem;">
                      <div style="flex: 1; min-width: 0;">
                        <p style="font-weight: 600; margin-bottom: 0.25rem;" x-text="p.title"></p>
                        <p class="subtitle" style="font-size: 0.85rem; margin-bottom: 0.6rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;" x-text="p.description || 'No description'"></p>
                        <div style="display: flex; flex-wrap: wrap; gap: 0.35rem; align-items: center;">
                          <template x-for="tag in (p.tech_stack || [])" :key="tag">
                            <span class="badge badge-outline" x-text="tag"></span>
                          </template>
                          <template x-if="p.links?.github">
                            <a :href="p.links.github" target="_blank" class="subtitle" style="font-size: 0.8rem; margin-left: 0.25rem;">GitHub ↗</a>
                          </template>
                          <template x-if="p.links?.live">
                            <a :href="p.links.live" target="_blank" class="subtitle" style="font-size: 0.8rem; margin-left: 0.25rem;">Live ↗</a>
                          </template>
                        </div>
                      </div>
                      <div style="display: flex; gap: 0.5rem; flex-shrink: 0;">
                        <button class="btn btn-outline btn-sm" @click="openEdit(p)">Edit</button>
                        <button class="btn btn-danger btn-sm" @click="deleteProject(p.id)">Delete</button>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </template>

            <!-- Modal -->
            <div class="modal-backdrop" x-show="showModal" @click.self="closeModal()">
              <div class="modal">
                <div class="modal-header">
                  <h3 x-text="editing ? 'Edit Project' : 'Add Project'"></h3>
                  <button class="modal-close" @click="closeModal()">✕</button>
                </div>
                <div x-show="error" class="alert alert-error" style="margin-bottom: 1rem;" x-text="error"></div>
                <div class="form-group"><label>Title *</label>
                  <input x-model="form.title" class="form-input" placeholder="My Project"></div>
                <div class="form-group"><label>Description</label>
                  <textarea x-model="form.description" class="form-input" rows="3"></textarea></div>
                <div class="form-group"><label>Tech stack <span class="subtitle">(comma-separated)</span></label>
                  <input x-model="form.tech_stack" class="form-input" placeholder="Python, AWS, Docker"></div>
                <div class="form-group"><label>GitHub URL</label>
                  <input x-model="form.github" class="form-input" placeholder="https://github.com/..."></div>
                <div class="form-group"><label>Live URL</label>
                  <input x-model="form.live" class="form-input" placeholder="https://..."></div>
                <div style="display: flex; gap: 0.75rem; margin-top: 0.5rem;">
                  <button class="btn btn-primary" @click="save()" :disabled="saving">
                    <span x-text="saving ? 'Saving...' : editing ? 'Update' : 'Add'"></span>
                  </button>
                  <button class="btn btn-outline" @click="closeModal()">Cancel</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Courses -->
          <div x-show="section === 'courses'" x-data="adminCourses()" x-init="init()">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <h1>Courses</h1>
              <button class="btn btn-primary btn-sm" @click="openCreate()">+ Add Course</button>
            </div>
            <div x-show="success" class="alert alert-success" style="margin-top: 1rem;" x-text="success"></div>

            <!-- Course list -->
            <div x-show="loading" class="loading-center" style="margin-top: 2rem;"><div class="spinner"></div></div>
            <template x-if="!loading">
              <div style="margin-top: 1.25rem;">
                <template x-if="courses.length === 0"><p class="subtitle">No courses yet.</p></template>
                <template x-for="c in courses" :key="c.id">
                  <div class="card" style="margin-bottom: 0.75rem;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem;">
                      <div style="flex: 1; min-width: 0;">
                        <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem;">
                          <p style="font-weight: 600;" x-text="c.title"></p>
                          <span class="badge badge-outline" x-show="c.platform" x-text="c.platform"></span>
                        </div>
                        <p class="subtitle" style="font-size: 0.85rem; margin-bottom: 0.5rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;" x-text="c.description || 'No description'"></p>
                        <template x-if="c.link">
                          <a :href="c.link" target="_blank" class="subtitle" style="font-size: 0.8rem;">View course ↗</a>
                        </template>
                      </div>
                      <div style="display: flex; gap: 0.5rem; flex-shrink: 0;">
                        <button class="btn btn-outline btn-sm" @click="openEdit(c)">Edit</button>
                        <button class="btn btn-danger btn-sm" @click="deleteCourse(c.id)">Delete</button>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </template>

            <!-- Modal -->
            <div class="modal-backdrop" x-show="showModal" @click.self="closeModal()">
              <div class="modal">
                <div class="modal-header">
                  <h3 x-text="editing ? 'Edit Course' : 'Add Course'"></h3>
                  <button class="modal-close" @click="closeModal()">✕</button>
                </div>
                <div x-show="error" class="alert alert-error" style="margin-bottom: 1rem;" x-text="error"></div>
                <div class="form-group"><label>Title *</label>
                  <input x-model="form.title" class="form-input" placeholder="Course name"></div>
                <div class="form-group"><label>Description</label>
                  <textarea x-model="form.description" class="form-input" rows="3"></textarea></div>
                <div class="form-group"><label>Platform</label>
                  <input x-model="form.platform" class="form-input" placeholder="Udemy, Coursera, ..."></div>
                <div class="form-group"><label>URL</label>
                  <input x-model="form.link" class="form-input" placeholder="https://..."></div>
                <div style="display: flex; gap: 0.75rem; margin-top: 0.5rem;">
                  <button class="btn btn-primary" @click="save()" :disabled="saving">
                    <span x-text="saving ? 'Saving...' : editing ? 'Update' : 'Add'"></span>
                  </button>
                  <button class="btn btn-outline" @click="closeModal()">Cancel</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Guestbook -->
          <div x-show="section === 'guestbook'" x-data="adminGuestbook()" x-init="init()">
            <h1>Guestbook</h1>
            <div x-show="loading" class="loading-center" style="margin-top: 2rem;"><div class="spinner"></div></div>
            <template x-if="!loading">
              <div style="margin-top: 1.25rem;">
                <template x-if="entries.length === 0"><p class="subtitle">No entries yet.</p></template>
                <template x-for="e in entries" :key="e.entry_id">
                  <div class="card" style="margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem;">
                    <div style="flex: 1; min-width: 0;">
                      <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem;">
                        <strong style="font-size: 0.9rem;" x-text="e.name"></strong>
                        <span class="badge badge-outline" x-show="e.identity" x-text="e.identity"></span>
                        <span class="badge badge-outline" x-show="!e.is_authenticated">guest</span>
                        <span class="subtitle" style="font-size: 0.75rem;" x-text="formatDate(e.created_at)"></span>
                      </div>
                      <p style="font-size: 0.9rem;" x-text="e.message"></p>
                    </div>
                    <button class="btn btn-danger btn-sm" style="flex-shrink: 0;"
                            @click="deleteEntry(e)">Delete</button>
                  </div>
                </template>
              </div>
            </template>
          </div>

          <!-- Comments -->
          <div x-show="section === 'comments'" x-data="adminComments()" x-init="init()">
            <h1>Comments</h1>
            <div x-show="loading" class="loading-center" style="margin-top: 2rem;"><div class="spinner"></div></div>
            <template x-if="!loading">
              <div style="margin-top: 1.25rem;">
                <template x-if="groups.length === 0"><p class="subtitle">No comments yet.</p></template>
                <template x-for="(group, gi) in groups" :key="group.entityPk">
                  <div style="margin-bottom: 1.5rem;">
                    <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                      <span class="badge badge-outline" x-text="group.entityPk.startsWith('PROJECT') ? 'Project' : 'Course'"></span>
                      <strong x-text="group.label"></strong>
                      <span class="subtitle" style="font-size: 0.8rem;" x-text="`(${group.comments.length})`"></span>
                    </div>
                    <template x-for="(c, ci) in group.comments" :key="c.comment_id">
                      <div class="card" style="margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem;">
                        <div style="flex: 1; min-width: 0;">
                          <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem;">
                            <strong style="font-size: 0.9rem;" x-text="c.name"></strong>
                            <span class="badge badge-outline" x-text="c.identity"></span>
                            <span class="subtitle" style="font-size: 0.75rem;" x-text="formatDate(c.created_at)"></span>
                          </div>
                          <p style="font-size: 0.9rem;" x-text="c.body"></p>
                        </div>
                        <button class="btn btn-danger btn-sm" style="flex-shrink: 0;"
                                @click="deleteComment(c.comment_id, group.entityPk, gi, ci)">Delete</button>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>
          </div>

          <!-- Quiz -->
          <div x-show="section === 'quiz'" x-data="adminQuiz()" x-init="init()">
            <h1>Quiz Questions</h1>
            <div x-show="error" class="alert alert-error" x-text="error"></div>

            <!-- Add/Edit form -->
            <div class="card" style="margin-bottom: 1.5rem;">
              <h3 x-text="editing ? 'Edit Question' : 'Add Question'"></h3>
              <div class="form-group"><label>Question</label>
                <input x-model="form.question" class="form-input" placeholder="What is...?"></div>
              <div class="form-group"><label>Options (4 choices)</label>
                <template x-for="(opt, idx) in form.options" :key="idx">
                  <input x-model="form.options[idx]" class="form-input" style="margin-bottom: 0.4rem;"
                         :placeholder="`Option ${idx + 1}`">
                </template>
              </div>
              <div class="form-group"><label>Correct answer (must match one option exactly)</label>
                <input x-model="form.answer" class="form-input" placeholder="Exact text of correct option"></div>
              <div class="form-group"><label>Topic</label>
                <input x-model="form.topic" class="form-input" placeholder="general"></div>
              <div style="display: flex; gap: 0.75rem;">
                <button class="btn btn-primary" @click="save()" :disabled="saving">
                  <span x-text="saving ? 'Saving...' : editing ? 'Update' : 'Add'"></span>
                </button>
                <button class="btn btn-outline" x-show="editing" @click="resetForm()">Cancel</button>
              </div>
            </div>

            <!-- Questions list -->
            <div x-show="loading" class="loading-center"><div class="spinner"></div></div>
            <template x-if="!loading">
              <div>
                <template x-if="questions.length === 0"><p class="subtitle">No questions yet.</p></template>
                <template x-for="q in questions" :key="q.question_id">
                  <div class="card" style="margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem;">
                    <div>
                      <p x-text="q.question" style="font-weight: 500;"></p>
                      <p class="subtitle" style="font-size: 0.8rem; margin-top: 0.3rem;" x-text="'Answer: ' + q.answer"></p>
                    </div>
                    <div style="display: flex; gap: 0.5rem; flex-shrink: 0;">
                      <button class="btn btn-outline btn-sm" @click="editQuestion(q)">Edit</button>
                      <button class="btn btn-danger btn-sm" @click="deleteQuestion(q.question_id)">Delete</button>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>

        </main>
      </div>
    </template>
  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/themes.js"></script>
  <script src="/assets/js/admin-app.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>

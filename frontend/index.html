<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ron Harifiyati</title>

  <!-- Open Graph / Social sharing -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Ron Harifiyati — Portfolio">
  <meta property="og:description" content="Integration Engineer at Jamf. Builder of APIs, automation, and systems.">
  <meta property="og:image" content="/assets/images/og-image.png">
  <meta property="og:url" content="https://dkdwnfmhg75yf.cloudfront.net">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Ron Harifiyati — Portfolio">
  <meta name="twitter:description" content="Integration Engineer at Jamf. Builder of APIs, automation, and systems.">
  <meta name="description" content="Ron Harifiyati — Integration Engineer, builder, and learner. Projects, courses, and more.">
  <meta name="theme-color" content="#007BFF">

  <!-- Styles -->
  <link rel="stylesheet" href="/assets/css/theme.css">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="icon" href="/assets/images/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/assets/images/favicon.ico">
</head>
<body>
  <div x-data="portfolioApp()">

    <!-- GLOBAL NAV -->
    <nav x-data="{ mobileOpen: false, moreOpen: false }" @click.outside="mobileOpen = false; moreOpen = false" @hashchange.window="mobileOpen = false; moreOpen = false">
      <div class="container nav-inner">
        <a href="#/" class="nav-brand">Ron Harifiyati</a>

        <div class="nav-right">
          <div class="nav-links" :class="{ 'nav-open': mobileOpen }">
            <!-- Primary links -->
            <a href="#/about" :class="{ active: currentPage === 'about' }">About</a>
            <a href="#/projects" :class="{ active: currentPage === 'projects' }">Projects</a>
            <a href="#/courses" :class="{ active: currentPage === 'courses' }">Courses</a>
            <a href="#/skills" :class="{ active: currentPage === 'skills' }">Skills</a>
            <a href="#/contact" :class="{ active: currentPage === 'contact' }">Contact</a>

            <!-- Desktop: More dropdown -->
            <div class="nav-more" @click.outside="moreOpen = false">
              <button class="nav-more-btn" @click="moreOpen = !moreOpen" :class="{ active: moreOpen }">
                More <span class="nav-more-chevron" :class="{ rotated: moreOpen }">▾</span>
              </button>
              <div class="nav-dropdown" :class="{ open: moreOpen }">
                <a href="#/stats" :class="{ active: currentPage === 'stats' }">Stats</a>
                <a href="#/guestbook" :class="{ active: currentPage === 'guestbook' }">Guestbook</a>
                <a href="#/testimonials" :class="{ active: currentPage === 'testimonials' }">Testimonials</a>
                <a href="#/developer" :class="{ active: currentPage === 'developer' }">Developer</a>
                <template x-if="isAuthenticated">
                  <a href="#/quiz" :class="{ active: currentPage === 'quiz' }">Quiz</a>
                </template>
                <template x-if="isAdmin">
                  <a href="/admin.html" class="nav-admin-link">Admin</a>
                </template>
              </div>
            </div>

            <!-- Mobile: secondary links shown flat (hidden on desktop) -->
            <div class="nav-secondary-mobile">
              <a href="#/stats" :class="{ active: currentPage === 'stats' }">Stats</a>
              <a href="#/guestbook" :class="{ active: currentPage === 'guestbook' }">Guestbook</a>
              <a href="#/testimonials" :class="{ active: currentPage === 'testimonials' }">Testimonials</a>
              <a href="#/developer" :class="{ active: currentPage === 'developer' }">Developer</a>
              <template x-if="isAuthenticated">
                <a href="#/quiz" :class="{ active: currentPage === 'quiz' }">Quiz</a>
              </template>
              <template x-if="isAdmin">
                <a href="/admin.html" class="nav-admin-link">Admin</a>
              </template>
            </div>

            <template x-if="!isAuthenticated">
              <a href="#/login" class="btn btn-primary btn-sm">Login</a>
            </template>
            <template x-if="isAuthenticated">
              <a href="#/settings" class="nav-identicon" :title="'Settings (' + user.name + ')'">
                <img :src="generateIdenticon(user.user_id, 32)" width="32" height="32"
                     style="border-radius:50%;" alt="Settings">
              </a>
            </template>
          </div>

          <template x-if="!isAuthenticated">
            <button class="theme-toggle" @click="toggleTheme()"
                    :title="'Switch theme (current: ' + theme + ')'"
                    aria-label="Toggle theme">
              <span x-text="{ light: '☀️', dark: '🌙', coffee: '☕', terminal: '>_', nordic: '❄️' }[theme] || '☀️'"></span>
            </button>
          </template>

          <button class="nav-hamburger" :class="{ open: mobileOpen }"
                  @click="mobileOpen = !mobileOpen"
                  aria-label="Toggle navigation"
                  :aria-expanded="mobileOpen">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </div>
    </nav>

    <!-- PERSONALISED GREETING (authenticated users) -->
    <template x-if="isAuthenticated && greeting">
      <div style="background: var(--bg-alt); border-bottom: 1px solid var(--border); padding: 0.4rem 0; text-align: center; font-size: 0.85rem; color: var(--text-muted);">
        <span x-text="greeting"></span>
      </div>
    </template>

    <!-- PAGE ROUTER -->
    <main class="container">

      <!-- HOME -->
      <template x-if="currentPage === 'home'">
        <div class="page" x-data="homePage()">

          <!-- ① HERO -->
          <section style="padding: 1.5rem 0 2rem; border-bottom: 1px solid var(--border);">
            <p style="font-size: 0.78rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.6rem;">
              Integration Engineer · Jamf
            </p>
            <h1>Hi, I'm Ron Harifiyati</h1>
            <p style="margin-top: 0.75rem; max-width: 520px; color: var(--text-muted); line-height: 1.65;">
              I build systems that connect things — APIs, workflows, and teams.
              I care about clean interfaces, reliable backends, and code that's easy to hand off.
            </p>
            <!-- Skill badges -->
            <div style="display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 1.25rem;">
              <span class="badge badge-outline">Python</span>
              <span class="badge badge-outline">Swift</span>
              <span class="badge badge-outline">AWS</span>
              <span class="badge badge-outline">JavaScript</span>
              <span class="badge badge-outline">Linux</span>
              <span class="badge badge-outline">Docker</span>
              <a href="#/skills" style="font-size: 0.78rem; padding: 0.2rem 0.4rem; color: var(--accent);">+ more &rarr;</a>
            </div>
            <!-- CTAs -->
            <div style="display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 1.4rem;">
              <a href="#/projects" class="btn btn-primary">See my work</a>
              <a href="#/contact" class="btn btn-outline">Get in touch</a>
            </div>
          </section>

          <!-- ② FEATURED PROJECTS -->
          <section style="padding: 2rem 0; border-bottom: 1px solid var(--border);">
            <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1rem;">
              <h2 style="margin: 0;">Featured Projects</h2>
              <a href="#/projects" style="font-size: 0.85rem;">All projects &rarr;</a>
            </div>
            <div x-show="loading" class="loading-center"><div class="spinner"></div></div>
            <div x-show="!loading">
              <template x-if="projects.length === 0">
                <p class="subtitle">No projects yet — check back soon.</p>
              </template>
              <div class="card-grid" x-show="projects.length > 0">
                <template x-for="p in projects" :key="p.id">
                  <a :href="'#/projects/' + p.id" class="card" style="text-decoration: none; display: block;">
                    <h3 x-text="p.title"></h3>
                    <p x-text="p.description" class="subtitle" style="font-size: 0.9rem; margin: 0.5rem 0;"></p>
                    <div style="display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.75rem;">
                      <template x-for="tag in (p.tech_stack || [])" :key="tag">
                        <span class="badge badge-outline" x-text="tag"></span>
                      </template>
                    </div>
                  </a>
                </template>
              </div>
            </div>
          </section>

          <!-- ③ TESTIMONIAL + STATS -->
          <section style="padding: 2rem 0; border-bottom: 1px solid var(--border);">
            <div x-show="loading" class="loading-center"><div class="spinner"></div></div>
            <div x-show="!loading">
              <div class="home-two-col">
                <!-- Testimonial pull quote -->
                <template x-if="testimonial">
                  <div class="card testimonial-quote">
                    <p x-text="'\u201C' + testimonial.body + '\u201D'" style="font-style: italic; line-height: 1.7; margin-bottom: 0.75rem;"></p>
                    <p style="font-size: 0.82rem; color: var(--text-muted);">
                      &mdash; <span x-text="testimonial.author || 'Anonymous'"></span>
                      <template x-if="testimonial.identity">
                        <span x-text="' · ' + testimonial.identity"></span>
                      </template>
                    </p>
                    <a href="#/testimonials" style="display: inline-block; margin-top: 0.75rem; font-size: 0.82rem;">Read more testimonials &rarr;</a>
                  </div>
                </template>
                <template x-if="!testimonial">
                  <div class="card testimonial-quote" style="display: flex; align-items: center; justify-content: center; min-height: 100px;">
                    <a href="#/testimonials" class="subtitle" style="font-size: 0.9rem;">Leave a testimonial &rarr;</a>
                  </div>
                </template>

                <!-- Stats -->
                <div style="display: flex; flex-direction: column; gap: 0.6rem;">
                  <div class="card" style="display: flex; justify-content: space-between; align-items: center; padding: 0.9rem 1.1rem;">
                    <span class="subtitle" style="font-size: 0.85rem;">Visitors from</span>
                    <span style="font-size: 1.1rem; font-weight: 700;">
                      <span x-text="visitorCountries > 0 ? visitorCountries + ' countries' : '—'"></span>
                    </span>
                  </div>
                  <div class="card" style="display: flex; justify-content: space-between; align-items: center; padding: 0.9rem 1.1rem;">
                    <span class="subtitle" style="font-size: 0.85rem;">Projects built</span>
                    <span style="font-size: 1.1rem; font-weight: 700;" x-text="projectCount !== null ? projectCount : '—'"></span>
                  </div>
                  <div class="card" style="display: flex; justify-content: space-between; align-items: center; padding: 0.9rem 1.1rem;">
                    <span class="subtitle" style="font-size: 0.85rem;">Courses published</span>
                    <span style="font-size: 1.1rem; font-weight: 700;" x-text="courseCount !== null ? courseCount : '—'"></span>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <!-- ④ FUN FACT + EXPLORE -->
          <section style="padding: 2rem 0;">
            <div class="home-two-col">
              <!-- Fun fact -->
              <div class="card">
                <h3>Fun Fact</h3>
                <div x-show="loading" class="loading-center" style="padding: 1rem 0;"><div class="spinner"></div></div>
                <p x-show="!loading && funFact" x-text="funFact" style="margin: 0.75rem 0; font-style: italic; color: var(--text-muted); line-height: 1.6;"></p>
                <p x-show="!loading && !funFact" class="subtitle">No fun facts yet.</p>
                <button x-show="!loading" class="btn btn-outline btn-sm" style="margin-top: 0.75rem;" @click="refreshFact()">
                  Another one
                </button>
              </div>

              <!-- Explore -->
              <div class="card">
                <h3>Explore</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-top: 0.75rem;">
                  <a href="#/quiz" class="btn btn-outline" style="text-align: center;">Quiz</a>
                  <a href="#/guestbook" class="btn btn-outline" style="text-align: center;">Guestbook</a>
                  <a href="#/stats" class="btn btn-outline" style="text-align: center;">Visitor Map</a>
                  <a href="#/developer" class="btn btn-outline" style="text-align: center;">API Docs</a>
                </div>
              </div>
            </div>
          </section>

        </div>
      </template>

      <!-- ABOUT -->
      <template x-if="currentPage === 'about'">
        <div class="page" x-data="aboutPage()">
          <div x-show="loading" class="loading-center"><div class="spinner"></div></div>
          <template x-if="!loading && about">
            <div>
              <h1>About me</h1>

              <!-- Mission + bio -->
              <p class="about-mission" x-text="about.mission"></p>
              <p class="about-body" x-text="about.bio"></p>

              <!-- Social links -->
              <div class="about-links">
                <template x-if="about.contact?.email">
                  <a :href="'mailto:' + about.contact.email" class="btn btn-outline btn-sm">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    Email
                  </a>
                </template>
                <template x-if="about.social_links?.github">
                  <a :href="about.social_links.github" target="_blank" class="btn btn-github btn-sm">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                    GitHub
                  </a>
                </template>
                <template x-if="about.social_links?.linkedin">
                  <a :href="about.social_links.linkedin" target="_blank" class="btn btn-outline btn-sm about-linkedin">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
                    LinkedIn
                  </a>
                </template>
              </div>

              <!-- Timeline -->
              <template x-if="timeline.length > 0">
                <div>
                  <hr class="about-divider">
                  <h2>Journey</h2>
                  <div class="timeline">
                    <template x-for="event in timeline" :key="event.date">
                      <div class="timeline-item fade-in">
                        <div class="timeline-dot"></div>
                        <p class="timeline-date" x-text="event.date"></p>
                        <h3 class="timeline-title" x-text="event.title"></h3>
                        <p class="timeline-desc" x-text="event.description"></p>
                      </div>
                    </template>
                  </div>
                </div>
              </template>

              <!-- Languages -->
              <template x-if="languages.length > 0">
                <div>
                  <hr class="about-divider">
                  <h2>Languages I Speak</h2>
                  <div class="about-lang-badges">
                    <template x-for="lang in languages" :key="lang.name">
                      <span class="about-lang-badge">
                        <span x-text="lang.name"></span>
                        <span class="about-lang-level"
                              :class="lang.level.toLowerCase()"
                              x-text="lang.level"></span>
                      </span>
                    </template>
                  </div>
                </div>
              </template>

              <!-- Beyond Code -->
              <template x-if="hobbies.length > 0">
                <div>
                  <hr class="about-divider">
                  <h2>Beyond Code</h2>
                  <div class="about-hobby-grid">
                    <template x-for="hobby in hobbies" :key="hobby.label">
                      <div class="about-hobby-card fade-in">
                        <span class="about-hobby-icon" x-text="hobby.icon"></span>
                        <span x-text="hobby.label"></span>
                      </div>
                    </template>
                  </div>
                </div>
              </template>

              <!-- Currently Learning -->
              <template x-if="learning.length > 0">
                <div>
                  <hr class="about-divider">
                  <h2>Currently Learning</h2>
                  <div class="about-lang-badges">
                    <template x-for="item in learning" :key="item">
                      <span class="badge badge-outline" x-text="item"></span>
                    </template>
                  </div>
                </div>
              </template>

              <!-- How I Work -->
              <template x-if="values.length > 0">
                <div>
                  <hr class="about-divider">
                  <h2>How I Work</h2>
                  <div class="about-values-grid">
                    <template x-for="val in values" :key="val.title">
                      <div class="about-value-card fade-in">
                        <h3 x-text="val.title"></h3>
                        <p x-text="val.description"></p>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </template>
          <template x-if="!loading && !about">
            <p class="subtitle">About content coming soon.</p>
          </template>
        </div>
      </template>

      <!-- PROJECTS LIST -->
      <template x-if="currentPage === 'projects'">
        <div class="page" x-data="projectsPage()">
          <h1>Projects</h1>
          <p class="subtitle">Things I've built.</p>
          <div x-show="loading" class="loading-center"><div class="spinner"></div></div>
          <div x-show="!loading">
            <template x-if="projects.length === 0">
              <p class="subtitle" style="margin-top: 2rem;">No projects yet.</p>
            </template>
            <div class="card-grid">
              <template x-for="p in projects" :key="p.id">
                <a :href="'#/projects/' + p.id" class="card project-card" style="text-decoration: none;">
                  <h3 x-text="p.title"></h3>
                  <p x-text="p.description" class="subtitle" style="font-size: 0.9rem; margin: 0.5rem 0 0.75rem;"></p>
                  <div style="display: flex; flex-wrap: wrap; gap: 0.4rem;">
                    <template x-for="tag in (p.tech_stack || [])" :key="tag">
                      <span class="badge badge-outline" x-text="tag"></span>
                    </template>
                  </div>
                  <div class="card-footer">
                    <span class="card-rating-pill" x-show="p.avg_rating">★ <span x-text="p.avg_rating"></span></span>
                    <span class="card-rating-none" x-show="!p.avg_rating">No ratings yet</span>
                    <span class="card-view">View &rarr;</span>
                  </div>
                </a>
              </template>
            </div>
          </div>
        </div>
      </template>

      <!-- PROJECT DETAIL -->
      <template x-if="currentPage === 'project-detail'">
        <div class="page" x-data="projectDetailPage()">
          <div x-show="loading" class="loading-center"><div class="spinner"></div></div>
          <template x-if="!loading && project">
            <div>
              <a href="#/projects" class="btn btn-outline btn-sm detail-back">&larr; Projects</a>
              <h1 x-text="project.title"></h1>
              <p x-text="project.description" style="margin: 1rem 0; line-height: 1.8;"></p>

              <!-- Tech stack -->
              <div style="display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.5rem;">
                <template x-for="tag in (project.tech_stack || [])" :key="tag">
                  <span class="badge" x-text="tag"></span>
                </template>
              </div>

              <!-- Links + Rating -->
              <div class="detail-meta">
                <div class="detail-links">
                  <template x-if="project.links?.github">
                    <a :href="project.links.github" target="_blank" class="btn btn-outline btn-sm">GitHub</a>
                  </template>
                  <template x-if="project.links?.live">
                    <a :href="project.links.live" target="_blank" class="btn btn-primary btn-sm">Live Demo</a>
                  </template>
                </div>
                <div class="card">
                  <h3>Rate this project</h3>
                  <template x-if="ratings">
                    <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.25rem;" x-text="ratings.count > 0 ? `${ratings.average} / 5 from ${ratings.count} ratings` : 'No ratings yet'"></p>
                  </template>
                  <div class="detail-stars">
                    <template x-for="n in [1,2,3,4,5]" :key="n">
                      <span @click="submitRating(n)"
                            @mouseover="hoverRating = n"
                            @mouseleave="hoverRating = 0"
                            style="cursor: pointer; transition: color 0.1s;"
                            :style="n <= (hoverRating || newRating) ? 'color: #F5A623;' : 'color: var(--border);'">★</span>
                    </template>
                  </div>
                </div>
              </div>

              <!-- Comments -->
              <h2>Comments (<span x-text="comments.length"></span>)</h2>
              <template x-if="comments.length === 0">
                <div class="comment-empty">No comments yet — be the first!</div>
              </template>
              <div style="margin-top: 1rem;">
                <template x-for="c in comments" :key="c.comment_id">
                  <div class="card" style="margin-bottom: 0.75rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.4rem;">
                      <strong x-text="c.name"></strong>
                      <span class="badge badge-outline" x-text="c.identity" x-show="c.identity"></span>
                    </div>
                    <p x-text="c.body"></p>
                  </div>
                </template>
              </div>

              <!-- Add comment -->
              <div style="margin-top: 1.5rem;">
                <div x-show="error" class="alert alert-error" x-text="error"></div>
                <div x-show="success" class="alert alert-success" x-text="success"></div>
                <div class="form-group">
                  <label>Leave a comment</label>
                  <textarea x-model="newComment" class="form-input" rows="3" placeholder="Share your thoughts..."></textarea>
                </div>
                <button class="btn btn-primary" @click="submitComment()" :disabled="submitting">
                  <span x-text="submitting ? 'Posting...' : 'Post comment'"></span>
                </button>
              </div>
            </div>
          </template>
        </div>
      </template>

      <!-- COURSES LIST -->
      <template x-if="currentPage === 'courses'">
        <div class="page" x-data="coursesPage()">
          <h1>Courses</h1>
          <p class="subtitle">Things I've studied.</p>
          <div x-show="loading" class="loading-center"><div class="spinner"></div></div>
          <div x-show="!loading">
            <template x-if="courses.length === 0">
              <p class="subtitle" style="margin-top: 2rem;">No courses yet.</p>
            </template>
            <div class="card-grid">
              <template x-for="c in courses" :key="c.id">
                <a :href="'#/courses/' + c.id" class="card project-card" style="text-decoration: none;">
                  <span class="badge badge-outline" style="align-self: flex-start; margin-bottom: 0.6rem;" x-text="c.platform"></span>
                  <h3 x-text="c.title"></h3>
                  <p x-text="c.description" class="subtitle" style="font-size: 0.9rem; margin: 0.5rem 0 0.75rem;"></p>
                  <div class="card-footer">
                    <span class="card-rating-pill" x-show="c.avg_rating">★ <span x-text="c.avg_rating"></span></span>
                    <span class="card-rating-none" x-show="!c.avg_rating">No ratings yet</span>
                    <span class="card-view">View &rarr;</span>
                  </div>
                </a>
              </template>
            </div>
          </div>
        </div>
      </template>

      <!-- COURSE DETAIL -->
      <template x-if="currentPage === 'course-detail'">
        <div class="page" x-data="courseDetailPage()">
          <div x-show="loading" class="loading-center"><div class="spinner"></div></div>
          <template x-if="!loading && course">
            <div>
              <a href="#/courses" class="btn btn-outline btn-sm detail-back">&larr; Courses</a>
              <span class="badge badge-outline" x-text="course.platform"></span>
              <h1 x-text="course.title" style="margin-top: 0.75rem;"></h1>
              <p x-text="course.description" style="margin: 1rem 0; line-height: 1.8;"></p>

              <!-- Link + Rating -->
              <div class="detail-meta">
                <div class="detail-links">
                  <template x-if="course.link">
                    <a :href="course.link" target="_blank" class="btn btn-outline btn-sm">View course</a>
                  </template>
                </div>
                <div class="card">
                  <h3>Rate this course</h3>
                  <template x-if="ratings">
                    <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.25rem;" x-text="ratings.count > 0 ? `${ratings.average} / 5 from ${ratings.count} ratings` : 'No ratings yet'"></p>
                  </template>
                  <div class="detail-stars">
                    <template x-for="n in [1,2,3,4,5]" :key="n">
                      <span @click="submitRating(n)"
                            @mouseover="hoverRating = n"
                            @mouseleave="hoverRating = 0"
                            style="cursor: pointer; transition: color 0.1s;"
                            :style="n <= (hoverRating || newRating) ? 'color: #F5A623;' : 'color: var(--border);'">★</span>
                    </template>
                  </div>
                </div>
              </div>

              <!-- Comments -->
              <h2>Comments (<span x-text="comments.length"></span>)</h2>
              <template x-if="comments.length === 0">
                <div class="comment-empty">No comments yet — be the first!</div>
              </template>
              <div style="margin-top: 1rem;">
                <template x-for="c in comments" :key="c.comment_id">
                  <div class="card" style="margin-bottom: 0.75rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.4rem;">
                      <strong x-text="c.name"></strong>
                      <span class="badge badge-outline" x-text="c.identity" x-show="c.identity"></span>
                    </div>
                    <p x-text="c.body"></p>
                  </div>
                </template>
              </div>
              <div style="margin-top: 1.5rem;">
                <div x-show="error" class="alert alert-error" x-text="error"></div>
                <div x-show="success" class="alert alert-success" x-text="success"></div>
                <div class="form-group">
                  <label>Leave a comment</label>
                  <textarea x-model="newComment" class="form-input" rows="3" placeholder="Share your thoughts..."></textarea>
                </div>
                <button class="btn btn-primary" @click="submitComment()" :disabled="submitting">
                  <span x-text="submitting ? 'Posting...' : 'Post comment'"></span>
                </button>
              </div>
            </div>
          </template>
        </div>
      </template>

      <!-- SKILLS -->
      <template x-if="currentPage === 'skills'">
        <div class="page" x-data="skillsPage()">
          <h1>Skills</h1>
          <p class="subtitle">My technical toolkit.</p>
          <div x-show="loading" class="loading-center"><div class="spinner"></div></div>
          <template x-if="!loading && skills">
            <div class="skills-grid">
              <template x-for="cat in categories()" :key="cat">
                <div class="card">
                  <p class="skill-category-title" x-text="cat.replace(/_/g, ' ')"></p>
                  <div class="skill-tags">
                    <template x-for="skill in skills[cat]" :key="skill">
                      <span class="badge badge-outline" x-text="skill"></span>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </template>
          <template x-if="!loading && !skills">
            <p class="subtitle" style="margin-top: 2rem;">Skills coming soon.</p>
          </template>
        </div>
      </template>

      <!-- STATS -->
      <template x-if="currentPage === 'stats'">
        <div class="page" x-data="statsPage()">
          <h1>Visitor Map</h1>
          <p class="subtitle">People who've visited from around the world.</p>
          <div x-show="loading" class="loading-center"><div class="spinner"></div></div>
          <template x-if="!loading">
            <div>
              <p class="subtitle" style="margin: 0.75rem 0;" x-text="`${total} unique visitor${total !== 1 ? 's' : ''}`"></p>
              <div id="visitor-map" class="visitor-map"></div>
              <template x-if="pageviews && pageviews.total > 0">
                <div class="card" style="margin-top: 2rem;">
                  <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1rem;">
                    <h2 style="margin: 0;">Page Views</h2>
                    <span class="subtitle" style="margin: 0;" x-text="`${pageviews.total} total views`"></span>
                  </div>
                  <div class="pageviews-list">
                    <template x-for="([page, count], index) in sortedPageviews" :key="page">
                      <div class="pageviews-row">
                        <span class="pageviews-rank"
                          :class="index === 0 ? 'rank-gold' : index === 1 ? 'rank-silver' : index === 2 ? 'rank-bronze' : 'rank-default'"
                          x-text="index + 1"></span>
                        <span class="pageviews-name" x-text="page"></span>
                        <div class="pageviews-bar-wrap">
                          <div class="pageviews-bar-fill" :style="`width: ${count / maxPageviews * 100}%`"></div>
                        </div>
                        <span class="pageviews-count" x-text="count"></span>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </template>
        </div>
      </template>

      <!-- CONTACT -->
      <template x-if="currentPage === 'contact'">
        <div class="page" x-data="contactPage()">
          <h1>Contact</h1>
          <p class="subtitle">Get in touch.</p>
          <div class="contact-grid">
            <!-- Contact details -->
            <div class="card">
              <h2>Details</h2>
              <template x-if="about?.contact">
                <div style="margin-top: 1.25rem;">
                  <template x-if="about.contact.email">
                    <div class="contact-detail-item">
                      <strong>Email:</strong>
                      <a :href="'mailto:' + about.contact.email" x-text="about.contact.email"></a>
                    </div>
                  </template>
                  <template x-if="about.contact.location">
                    <div class="contact-detail-item">
                      <strong>Location:</strong>
                      <span x-text="about.contact.location"></span>
                    </div>
                  </template>
                </div>
              </template>
              <template x-if="about?.social_links">
                <div class="about-links" style="margin-top: 1.25rem;">
                  <template x-if="about.social_links.github">
                    <a :href="about.social_links.github" target="_blank" class="btn btn-outline btn-sm btn-github">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
                      GitHub
                    </a>
                  </template>
                  <template x-if="about.social_links.linkedin">
                    <a :href="about.social_links.linkedin" target="_blank" class="btn btn-outline btn-sm about-linkedin">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                      LinkedIn
                    </a>
                  </template>
                </div>
              </template>
            </div>

            <!-- Contact form -->
            <div class="card">
              <h2>Send a message</h2>
              <div x-show="error" class="alert alert-error" x-text="error"></div>
              <div x-show="success" class="alert alert-success" x-text="success"></div>
              <form @submit.prevent="submitForm()" style="margin-top: 1rem;">
                <div class="form-group">
                  <label>Name</label>
                  <input x-model="form.name" class="form-input" type="text" placeholder="Your name" required>
                </div>
                <div class="form-group">
                  <label>Email</label>
                  <input x-model="form.email" class="form-input" type="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                  <label>Message</label>
                  <textarea x-model="form.message" class="form-input" rows="5" placeholder="Your message..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" :disabled="submitting">
                  <span x-text="submitting ? 'Sending...' : 'Send message'"></span>
                </button>
              </form>
            </div>
          </div>
        </div>
      </template>

      <!-- GUESTBOOK -->
      <template x-if="currentPage === 'guestbook'">
        <div class="page" x-data="guestbookPage()">
          <h1>Guestbook</h1>
          <p class="subtitle">Say hello — everyone's welcome.</p>

          <!-- Submit form -->
          <div class="card submit-card">
            <h3>Leave a message</h3>
            <template x-if="!isAuthenticated">
              <p class="subtitle" style="margin-top: 0.75rem;">
                <a href="#/login" class="text-link">Log in</a> or <a href="#/register" class="text-link">create an account</a> to leave a message.
              </p>
            </template>
            <template x-if="isAuthenticated">
              <div style="margin-top: 0.75rem;">
                <div x-show="error" class="alert alert-error" x-text="error"></div>
                <div x-show="success" class="alert alert-success" x-text="success"></div>
                <div class="form-group">
                  <label>Name</label>
                  <input x-model="form.name" class="form-input" placeholder="Your name" autocomplete="name">
                </div>
                <div class="form-group">
                  <div class="label-row">
                    <label>Message</label>
                    <span class="label-row-counter" x-text="messageCharsLeft + ' left'"></span>
                  </div>
                  <textarea x-model="form.message" class="form-input" rows="3" placeholder="What's on your mind?" maxlength="500"></textarea>
                </div>
                <button class="btn btn-primary" @click="submit()" :disabled="submitting">
                  <span x-text="submitting ? 'Posting...' : 'Post'"></span>
                </button>
              </div>
            </template>
          </div>

          <!-- Entries list -->
          <div x-show="loading" class="loading-center" style="margin-top: 2rem;"><div class="spinner"></div></div>
          <div x-show="!loading" style="margin-top: 2rem;">
            <template x-if="entries.length === 0">
              <div class="comment-empty">No entries yet — be the first to say hello!</div>
            </template>
            <template x-for="entry in entries" :key="entry.entry_id">
              <div class="card guestbook-entry">
                <div class="guestbook-entry-header">
                  <div class="guestbook-entry-author">
                    <strong x-text="entry.name"></strong>
                    <span class="badge badge-outline" x-text="entry.identity" x-show="entry.identity"></span>
                  </div>
                  <span class="guestbook-entry-date" x-text="formatDate(entry.created_at)"></span>
                </div>
                <p x-text="entry.message"></p>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- TESTIMONIALS -->
      <template x-if="currentPage === 'testimonials'">
        <div class="page" x-data="testimonialsPage()">
          <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem;">
            <div>
              <h1>Testimonials</h1>
              <p class="subtitle">What people say.</p>
            </div>
            <button class="btn btn-primary" @click="showModal = true">Leave a testimonial</button>
          </div>

          <!-- Identity filter -->
          <div class="filter-pills">
            <template x-for="identity in identities" :key="identity">
              <button class="btn btn-sm"
                      :class="activeFilter === identity ? 'btn-primary' : 'btn-outline'"
                      @click="setFilter(identity)"
                      x-text="identity === 'all' ? 'All' : identity">
              </button>
            </template>
          </div>

          <!-- Testimonials list -->
          <div x-show="loading" class="loading-center"><div class="spinner"></div></div>
          <div x-show="!loading" style="margin-top: 1.5rem;">
            <template x-if="filtered.length === 0">
              <div class="comment-empty">No testimonials yet — be the first to submit one below!</div>
            </template>
            <div class="card-grid">
              <template x-for="t in filtered" :key="t.testimonial_id">
                <div class="card">
                  <p x-text="'\u201C' + t.body + '\u201D'" class="testimonial-body"></p>
                  <div class="testimonial-author">
                    <strong x-text="t.anonymous ? 'Anonymous' : t.author"></strong>
                    <span class="badge badge-outline" x-text="t.identity" x-show="t.identity"></span>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- Modal -->
          <div class="modal-backdrop" x-show="showModal" @click.self="showModal = false">
            <div class="modal">
              <div class="modal-header">
                <h3>Leave a testimonial</h3>
                <button class="modal-close" @click="showModal = false">&times;</button>
              </div>
              <p class="subtitle" style="font-size: 0.85rem; margin-bottom: 1rem;">Pending admin approval before going live.</p>
              <div x-show="error" class="alert alert-error" x-text="error"></div>
              <div x-show="success" class="alert alert-success" x-text="success"></div>
              <div class="form-group">
                <label>Your testimonial</label>
                <textarea x-model="form.body" class="form-input" rows="4" placeholder="What would you like to say?"></textarea>
              </div>
              <div class="form-group" x-show="!form.anonymous">
                <label>Your name (optional)</label>
                <input x-model="form.author" class="form-input" placeholder="Leave blank to be anonymous">
              </div>
              <div class="form-group">
                <label>Identity</label>
                <select x-model="form.identity" class="form-input">
                  <option>Jamf</option>
                  <option>MCRI</option>
                  <option>Friend</option>
                  <option>Family</option>
                  <option selected>Other</option>
                </select>
              </div>
              <div class="form-check">
                <input type="checkbox" x-model="form.anonymous" id="anon">
                <label for="anon">Submit anonymously</label>
              </div>
              <button class="btn btn-primary" style="margin-top: 1rem;" @click="submit()" :disabled="submitting">
                <span x-text="submitting ? 'Submitting...' : 'Submit'"></span>
              </button>
            </div>
          </div>
        </div>
      </template>

      <!-- DEVELOPER -->
      <template x-if="currentPage === 'developer'">
        <div class="page" x-data="developerPage()">
          <h1>Developer</h1>
          <p class="subtitle">Explore the API that powers this portfolio.</p>

          <div class="stack-cards">
            <div class="card">
              <h3>Interactive API docs</h3>
              <p class="card-desc">Try every endpoint live in your browser.</p>
              <a :href="apiUrl + '/api'" target="_blank" class="btn btn-primary card-action">Open Swagger UI</a>
            </div>

            <div class="card">
              <h3>OpenAPI spec</h3>
              <p class="card-desc">Import into Postman or any OpenAPI-compatible tool.</p>
              <a :href="apiUrl + '/api/spec'" target="_blank" class="btn btn-outline card-action">Download spec (JSON)</a>
            </div>

            <template x-if="meta">
              <div class="card">
                <h3>Deploy info</h3>
                <table class="meta-table" style="margin-top: 0.75rem;">
                  <tr><td>Version</td><td x-text="meta.version"></td></tr>
                  <tr><td>Environment</td><td x-text="meta.environment"></td></tr>
                  <tr><td>Git SHA</td><td><code x-text="meta.git_sha?.slice(0, 8)"></code></td></tr>
                  <tr><td>Deployed</td><td x-text="meta.deploy_timestamp"></td></tr>
                </table>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- QUIZ (auth required) -->
      <div x-show="currentPage === 'quiz'" class="page">
        <template x-if="!isAuthenticated">
          <div class="quiz-center" style="padding: 4rem 0;">
            <h1>Quiz</h1>
            <p class="subtitle">Log in to take the quiz and compete on the leaderboard.</p>
            <a href="#/login" class="btn btn-primary">Log in</a>
          </div>
        </template>
        <template x-if="isAuthenticated">
          <div x-data="quizPage()">

            <!-- Loading -->
            <div x-show="state === 'loading'" class="loading-center"><div class="spinner"></div></div>

            <!-- Start screen -->
            <div x-show="state === 'start'" class="quiz-center">
              <h1>Quiz</h1>
              <p class="subtitle" x-text="`${questions.length} questions · Test your knowledge`"></p>
              <div x-show="error" class="alert alert-error" style="max-width: 400px; margin: 1rem auto;" x-text="error"></div>
              <button class="btn btn-primary" @click="startQuiz()" x-show="questions.length > 0">Start Quiz</button>
              <button class="btn btn-outline" style="display: block; margin: 0.5rem auto 0;" @click="showLeaderboard()">View Leaderboard</button>
            </div>

            <!-- Playing -->
            <div x-show="state === 'playing'">
              <div class="quiz-header">
                <h1>Quiz</h1>
                <span class="subtitle" x-text="`Question ${current + 1} of ${questions.length}`"></span>
              </div>

              <!-- Progress bar -->
              <div class="quiz-progress">
                <div class="quiz-progress-fill" :style="`width: ${progress}%`"></div>
              </div>

              <div x-show="error" class="alert alert-error" x-text="error"></div>

              <!-- Single question -->
              <template x-if="currentQuestion">
                <div class="card">
                  <p class="quiz-question" x-text="currentQuestion.question"></p>
                  <div class="quiz-options">
                    <template x-for="option in currentQuestion.options" :key="option">
                      <button class="btn quiz-option"
                              :class="answers[currentQuestion.question_id] === option ? 'btn-primary' : 'btn-outline'"
                              @click="selectAnswer(currentQuestion.question_id, option)"
                              x-text="option">
                      </button>
                    </template>
                  </div>
                </div>
              </template>

              <!-- Navigation -->
              <div class="quiz-nav">
                <button class="btn btn-outline"
                        @click="prevQuestion()"
                        :style="current === 0 ? 'visibility: hidden;' : ''">
                  ← Back
                </button>
                <template x-if="!isLastQuestion">
                  <button class="btn btn-primary"
                          @click="nextQuestion()"
                          :disabled="!currentQuestion || !isAnswered(currentQuestion.question_id)">
                    Next →
                  </button>
                </template>
                <template x-if="isLastQuestion">
                  <button class="btn btn-primary"
                          @click="submitQuiz()"
                          :disabled="!isAnswered(currentQuestion?.question_id) || submitting">
                    <span x-text="submitting ? 'Submitting...' : 'Submit Quiz'"></span>
                  </button>
                </template>
              </div>
            </div>

            <!-- Result -->
            <div x-show="state === 'result'" class="quiz-center">
              <div class="quiz-emoji" x-text="scorePercent === 100 ? '🏆' : scorePercent >= 80 ? '🎉' : '📝'"></div>
              <h1 x-text="scoreMessage()" style="margin-top: 1rem;"></h1>
              <template x-if="result">
                <div>
                  <p class="subtitle quiz-result-score">
                    <span x-text="result.score"></span> / <span x-text="result.total"></span>
                    (<span x-text="scorePercent"></span>%)
                  </p>
                  <div class="quiz-result-bar">
                    <div class="quiz-result-bar-fill" :style="`width: ${scorePercent}%`"></div>
                  </div>
                </div>
              </template>
              <div class="quiz-result-actions">
                <button class="btn btn-outline" @click="startQuiz()">Try again</button>
                <button class="btn btn-primary" @click="showLeaderboard()">Leaderboard</button>
              </div>
            </div>

            <!-- Leaderboard -->
            <div x-show="state === 'leaderboard'">
              <div class="leaderboard-header">
                <h1>Leaderboard</h1>
                <button class="btn btn-outline btn-sm" @click="state = 'start'">&larr; Back</button>
              </div>
              <div x-show="loadingLeaderboard" class="loading-center"><div class="spinner"></div></div>
              <template x-if="!loadingLeaderboard">
                <div>
                  <template x-if="leaderboard.length === 0">
                    <div class="comment-empty">No scores yet — be the first to play!</div>
                  </template>
                  <div class="leaderboard-list">
                    <template x-for="(entry, idx) in leaderboard" :key="entry.attempt_id">
                      <div class="card leaderboard-entry">
                        <div class="leaderboard-entry-left">
                          <span class="leaderboard-rank"
                                x-text="idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : (idx + 1) + '.'">
                          </span>
                          <span x-text="formatLeader(entry.user_id)"></span>
                        </div>
                        <span class="leaderboard-score" x-text="`${entry.score} / ${entry.total}`"></span>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>

          </div>
        </template>
      </div>

      <!-- LOGIN -->
      <template x-if="currentPage === 'login'">
        <div class="page" x-data="loginPage()">
          <div class="auth-wrapper">
            <div class="card">
              <h1 style="margin-bottom: 0.25rem;">Sign in</h1>
              <p class="subtitle" style="margin-bottom: 1.5rem;">Welcome back.</p>

              <div x-show="error" class="alert alert-error" style="margin-bottom: 1rem;">
                <span x-text="error"></span>
                <template x-if="unverifiedEmail">
                  <div style="margin-top: 0.75rem;">
                    <button class="btn btn-outline btn-sm" @click="resendVerification()" :disabled="resendSending">
                      <span x-text="resendSending ? 'Sending...' : 'Resend verification email'"></span>
                    </button>
                    <span x-show="resendSent" style="margin-left: 0.5rem; font-size: 0.85rem; color: var(--alert-success-text);">Email sent!</span>
                    <span x-show="resendError" x-text="resendError" style="display: block; margin-top: 0.4rem; font-size: 0.85rem; color: var(--alert-error-text);"></span>
                  </div>
                </template>
              </div>

              <!-- OAuth buttons -->
              <div class="oauth-buttons">
                <button class="btn btn-oauth btn-github" @click="loginWithGithub()">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                  Continue with GitHub
                </button>
                <button class="btn btn-outline btn-oauth btn-google" @click="loginWithGoogle()">
                  <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                  Continue with Google
                </button>
              </div>

              <div class="auth-divider">
                <div class="auth-divider-line"></div>
                <span>or</span>
                <div class="auth-divider-line"></div>
              </div>

              <!-- Email/password form -->
              <form @submit.prevent="submit()" autocomplete="on">
                <div class="form-group">
                  <label>Email</label>
                  <input x-model="form.email" type="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                  <label>Password</label>
                  <input x-model="form.password" type="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <div class="form-check" style="margin-bottom: 1rem;">
                  <input type="checkbox" x-model="form.remember_me" id="remember">
                  <label for="remember">Remember me (7 days)</label>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;" :disabled="submitting">
                  <span x-text="submitting ? 'Logging in...' : 'Log in'"></span>
                </button>
              </form>
            </div>

            <p class="auth-footer">
              <a href="#/forgot-password">Forgot password?</a>
              &nbsp;&middot;&nbsp;
              Don't have an account? <a href="#/register">Sign up</a>
            </p>
          </div>
        </div>
      </template>

      <!-- REGISTER -->
      <template x-if="currentPage === 'register'">
        <div class="page" x-data="registerPage()">
          <div class="auth-wrapper">
            <div class="card">
              <h1 style="margin-bottom: 0.25rem;">Create account</h1>
              <p class="subtitle" style="margin-bottom: 1.5rem;">Join and unlock interactive features.</p>

              <div x-show="error" class="alert alert-error" style="margin-bottom: 1rem;" x-text="error"></div>
              <div x-show="success" class="alert alert-success" style="margin-bottom: 1rem;">
                <span x-text="success"></span>
                <div style="margin-top: 0.75rem;">
                  <p style="font-size: 0.85rem; margin-bottom: 0.4rem;">Didn't receive it?</p>
                  <button class="btn btn-outline btn-sm" @click="resendVerification()" :disabled="resendSending">
                    <span x-text="resendSending ? 'Sending...' : 'Resend verification email'"></span>
                  </button>
                  <span x-show="resendSent" style="display: block; margin-top: 0.4rem; font-size: 0.85rem; color: var(--alert-success-text);">New email sent!</span>
                  <span x-show="resendError" x-text="resendError" style="display: block; margin-top: 0.4rem; font-size: 0.85rem; color: var(--alert-error-text);"></span>
                </div>
              </div>

              <form @submit.prevent="submit()" x-show="!success" autocomplete="on">
                <div class="form-group">
                  <label>Name</label>
                  <input x-model="form.name" class="form-input" placeholder="Your name" autocomplete="name" required>
                </div>
                <div class="form-group">
                  <label>Email</label>
                  <input x-model="form.email" type="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                  <label>Password</label>
                  <input x-model="form.password" type="password" class="form-input" placeholder="Min. 8 characters" autocomplete="new-password" required>
                  <div x-show="form.password.length > 0" class="password-strength">
                    <span class="password-strength-label" x-text="passwordStrengthLabel" :style="'color: ' + passwordStrengthColor"></span>
                    <div class="password-strength-bar">
                      <div class="password-strength-bar-fill" :style="'background: ' + passwordStrengthColor + '; width: ' + (passwordStrength / 5 * 100) + '%;'"></div>
                    </div>
                  </div>
                </div>

                <!-- Identity picker -->
                <div class="form-group">
                  <label>How do you know me?</label>
                  <div style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.4rem;">
                    <template x-for="id in identities" :key="id">
                      <button type="button"
                              class="btn btn-sm"
                              :class="form.identity === id ? 'btn-primary' : 'btn-outline'"
                              @click="form.identity = id"
                              x-text="id">
                      </button>
                    </template>
                  </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;" :disabled="submitting">
                  <span x-text="submitting ? 'Creating account...' : 'Create account'"></span>
                </button>
              </form>
            </div>

            <p class="auth-footer">
              Already have an account? <a href="#/login">Log in</a>
            </p>
          </div>
        </div>
      </template>

      <!-- VERIFY EMAIL -->
      <template x-if="currentPage === 'verify-email'">
        <div class="page" x-data="verifyEmailPage()">
          <div style="max-width: 400px; margin: 4rem auto; text-align: center;">
            <div x-show="status === 'loading'" class="loading-center"><div class="spinner"></div></div>
            <div x-show="status === 'ready'">
              <div style="font-size: 3rem;">✉</div>
              <h1 style="margin-top: 1rem;">Confirm your email</h1>
              <p class="subtitle">Click the button below to verify your email address and activate your account.</p>
              <button @click="verify()" class="btn btn-primary" style="margin-top: 1.5rem;">Verify my email</button>
            </div>
            <div x-show="status === 'success'">
              <div style="font-size: 3rem;">✓</div>
              <h1 style="margin-top: 1rem;">Email verified!</h1>
              <p class="subtitle" x-text="message"></p>
              <p style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-muted);">Redirecting to login...</p>
            </div>
            <div x-show="status === 'error'">
              <div style="font-size: 3rem;">✗</div>
              <h1 style="margin-top: 1rem;">Verification failed</h1>
              <p class="subtitle" x-text="message"></p>
              <div style="display: flex; gap: 0.75rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap;">
                <a href="#/login" class="btn btn-primary">Try logging in</a>
                <a href="#/register" class="btn btn-outline">Register again</a>
              </div>
            </div>
          </div>
        </div>
      </template>

      <!-- FORGOT PASSWORD -->
      <template x-if="currentPage === 'forgot-password'">
        <div class="page" x-data="forgotPasswordPage()">
          <div style="max-width: 400px; margin: 3rem auto;">
            <h1>Forgot password?</h1>
            <p class="subtitle">Enter your email and we'll send you a reset link. Valid for 1 hour.</p>
            <div x-show="error" class="alert alert-error" style="margin-top: 1rem;" x-text="error"></div>
            <div x-show="sent" class="alert alert-success" style="margin-top: 1rem;">
              If that address is registered, a reset link is on its way. Check your inbox.
            </div>
            <form @submit.prevent="submit()" style="margin-top: 1.5rem;" x-show="!sent" autocomplete="on">
              <div class="form-group">
                <label>Email</label>
                <input x-model="form.email" type="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
              </div>
              <button type="submit" class="btn btn-primary" style="width: 100%;" :disabled="submitting">
                <span x-text="submitting ? 'Sending...' : 'Send reset link'"></span>
              </button>
            </form>
            <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem; color: var(--text-muted);">
              <a href="#/login">&larr; Back to login</a>
            </p>
          </div>
        </div>
      </template>

      <!-- OAUTH CALLBACK -->
      <template x-if="currentPage === 'oauth-callback'">
        <div class="page" x-data="oauthCallbackPage()">
          <div style="max-width: 400px; margin: 4rem auto; text-align: center;">
            <div x-show="!error" class="loading-center"><div class="spinner"></div></div>
            <div x-show="error" class="card" style="padding: 2rem;">
              <p style="color: var(--danger);" x-text="error"></p>
              <a href="#/login" class="btn btn-primary" style="margin-top: 1rem;">Back to login</a>
            </div>
          </div>
        </div>
      </template>

      <!-- RESET PASSWORD -->
      <template x-if="currentPage === 'reset-password'">
        <div class="page" x-data="resetPasswordPage()">
          <div style="max-width: 400px; margin: 3rem auto;">
            <h1>Set a new password</h1>
            <div x-show="error" class="alert alert-error" style="margin-top: 1rem;">
              <span x-text="error"></span>
              <a href="#/forgot-password" style="display: block; margin-top: 0.5rem; font-size: 0.85rem;">Request a new link &rarr;</a>
            </div>
            <div x-show="success" class="alert alert-success" style="margin-top: 1rem;">
              Password updated! Redirecting to login...
            </div>
            <form @submit.prevent="submit()" style="margin-top: 1.5rem;" x-show="!success && token" autocomplete="on">
              <div class="form-group">
                <label>New password</label>
                <input x-model="form.new_password" type="password" class="form-input" placeholder="Min. 8 characters" autocomplete="new-password" required>
              </div>
              <div class="form-group">
                <label>Confirm password</label>
                <input x-model="form.confirm_password" type="password" class="form-input" placeholder="Repeat password" autocomplete="new-password" required>
              </div>
              <button type="submit" class="btn btn-primary" style="width: 100%;" :disabled="submitting">
                <span x-text="submitting ? 'Updating...' : 'Reset password'"></span>
              </button>
            </form>
          </div>
        </div>
      </template>

      <!-- SETTINGS -->
      <template x-if="currentPage === 'settings'">
        <div class="page" x-data="settingsPage()" x-init="init()">
          <div class="settings-layout">
            <div class="settings-sidebar">
              <div class="settings-sidebar-title">Settings</div>
              <template x-for="s in sections" :key="s">
                <a class="settings-nav-link"
                   :class="{ active: activeSection === s, danger: s === 'account' }"
                   @click.prevent="scrollTo(s)"
                   href="#"
                   x-text="s[0].toUpperCase() + s.slice(1)"></a>
              </template>
            </div>

            <div class="settings-content">
              <!-- PROFILE -->
              <section id="settings-profile" class="settings-section">
                <h2>Profile</h2>
                <p class="subtitle">Manage your personal information</p>
                <div class="settings-profile-header">
                  <img :src="generateIdenticon(getApp()?.user?.user_id, 52)" width="52" height="52"
                       style="border-radius:50%;" alt="Avatar">
                  <div>
                    <strong x-text="getApp()?.user?.name || ''"></strong>
                    <div class="text-muted" style="font-size:0.8rem;">
                      <span x-text="getApp()?.user?.email || ''"></span>
                      <template x-if="getApp()?.user?.created_at">
                        <span> · Member since <span x-text="new Date(getApp().user.created_at * 1000).toLocaleDateString('en-US',{month:'short',year:'numeric'})"></span></span>
                      </template>
                    </div>
                  </div>
                </div>
                <div class="settings-form-grid">
                  <div>
                    <label>Display Name</label>
                    <input type="text" x-model="profileForm.name" @input="onProfileChange()" maxlength="100">
                  </div>
                  <div>
                    <label>Identity</label>
                    <select x-model="profileForm.identity" @change="onProfileChange()">
                      <option>Jamf</option><option>MCRI</option><option>Friend</option><option>Family</option><option>Other</option>
                    </select>
                  </div>
                </div>
                <div style="margin-bottom:1rem;">
                  <label>Email</label>
                  <div class="text-muted" style="font-size:0.85rem;">
                    <span x-text="getApp()?.user?.email"></span>
                    <span class="settings-badge">read-only</span>
                  </div>
                </div>
                <template x-if="profileMessage">
                  <div class="settings-toast" :class="profileMessage.type" x-text="profileMessage.text"></div>
                </template>
                <button class="btn btn-primary" @click="saveProfile()" :disabled="!profileDirty || profileSaving"
                        x-text="profileSaving ? 'Saving...' : 'Save Changes'"></button>
              </section>

              <hr class="settings-divider">

              <!-- APPEARANCE -->
              <section id="settings-appearance" class="settings-section">
                <h2>Appearance</h2>
                <p class="subtitle">Choose your theme — synced across devices</p>
                <div class="theme-grid">
                  <template x-for="t in themes" :key="t">
                    <div class="theme-card" :class="{ active: getApp()?.theme === t }" @click="selectTheme(t)">
                      <div class="theme-preview" :data-theme-preview="t"></div>
                      <div class="theme-name" x-text="t[0].toUpperCase() + t.slice(1)"></div>
                      <div class="theme-check" x-show="getApp()?.theme === t">✓</div>
                    </div>
                  </template>
                </div>
              </section>

              <hr class="settings-divider">

              <!-- CONNECTIONS -->
              <section id="settings-connections" class="settings-section">
                <h2>Connections</h2>
                <p class="subtitle">Manage sign-in methods — must keep at least one active</p>
                <div x-show="connectionsLoading" class="text-muted">Loading...</div>
                <div x-show="!connectionsLoading">
                  <div class="connection-card">
                    <div class="connection-info">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                      <div>
                        <strong>GitHub</strong>
                        <div class="text-muted" x-text="isConnected('github') ? 'Connected as ' + getProviderUsername('github') : 'Not connected'" style="font-size:0.78rem;"></div>
                      </div>
                    </div>
                    <button x-show="isConnected('github')" class="btn btn-outline btn-sm btn-danger" @click="disconnectProvider('github')">Disconnect</button>
                    <button x-show="!isConnected('github')" class="btn btn-primary btn-sm" @click="connectProvider('github')">Connect</button>
                  </div>
                  <div class="connection-card">
                    <div class="connection-info">
                      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                      <div>
                        <strong>Google</strong>
                        <div class="text-muted" x-text="isConnected('google') ? 'Connected as ' + getProviderUsername('google') : 'Not connected'" style="font-size:0.78rem;"></div>
                      </div>
                    </div>
                    <button x-show="isConnected('google')" class="btn btn-outline btn-sm btn-danger" @click="disconnectProvider('google')">Disconnect</button>
                    <button x-show="!isConnected('google')" class="btn btn-primary btn-sm" @click="connectProvider('google')">Connect</button>
                  </div>
                  <div class="connection-card">
                    <div class="connection-info">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                      <div>
                        <strong>Password</strong>
                        <div class="text-muted" style="font-size:0.78rem;">
                          <template x-if="hasPassword"><span>Set · <a href="#/forgot-password">Reset via email</a></span></template>
                          <template x-if="!hasPassword"><span>Not set · <a href="#/forgot-password">Set via email</a></span></template>
                        </div>
                      </div>
                    </div>
                    <span x-show="hasPassword" style="font-size:0.78rem;font-weight:500;color:#27ae60;">✓ Active</span>
                  </div>
                </div>
              </section>

              <hr class="settings-divider">

              <!-- ACTIVITY -->
              <section id="settings-activity" class="settings-section">
                <h2>Activity</h2>
                <p class="subtitle">Your contributions across the site</p>
                <div class="activity-tabs">
                  <template x-for="tab in ['comments','ratings','quiz','guestbook','testimonials']" :key="tab">
                    <button class="activity-tab" :class="{ active: activityTab === tab }" @click="activityTab = tab">
                      <span x-text="tab[0].toUpperCase() + tab.slice(1)"></span>
                      <span class="activity-count" x-text="activityCounts[tab]"></span>
                    </button>
                  </template>
                </div>
                <div x-show="activityLoading" class="text-muted">Loading...</div>

                <div x-show="activityTab === 'comments' && !activityLoading">
                  <template x-if="activityData.comments.length === 0"><p class="text-muted">No comments yet.</p></template>
                  <template x-for="c in activityData.comments" :key="c.comment_id">
                    <div class="activity-item">
                      <div>
                        <div class="activity-meta"><span x-text="timeAgo(c.created_at)"></span></div>
                        <div x-text="c.body"></div>
                      </div>
                      <button class="btn btn-outline btn-sm btn-danger" @click="deleteComment(c.comment_id)">Delete</button>
                    </div>
                  </template>
                </div>

                <div x-show="activityTab === 'ratings' && !activityLoading">
                  <template x-if="activityData.ratings.length === 0"><p class="text-muted">No ratings yet.</p></template>
                  <template x-for="r in activityData.ratings" :key="r.SK">
                    <div class="activity-item">
                      <div>
                        <div class="activity-meta"><span x-text="timeAgo(r.created_at)"></span></div>
                        <div x-text="'★'.repeat(r.stars) + '☆'.repeat(5 - r.stars)"></div>
                      </div>
                    </div>
                  </template>
                </div>

                <div x-show="activityTab === 'quiz' && !activityLoading">
                  <template x-if="activityData.quiz.length === 0"><p class="text-muted">No quiz attempts yet.</p></template>
                  <template x-for="q in activityData.quiz" :key="q.attempt_id">
                    <div class="activity-item">
                      <div>
                        <div class="activity-meta"><span x-text="timeAgo(q.created_at)"></span></div>
                        <div>Score: <strong x-text="q.score"></strong> / <span x-text="q.total"></span></div>
                      </div>
                    </div>
                  </template>
                </div>

                <div x-show="activityTab === 'guestbook' && !activityLoading">
                  <template x-if="activityData.guestbook.length === 0"><p class="text-muted">No guestbook entries yet.</p></template>
                  <template x-for="g in activityData.guestbook" :key="g.entry_id">
                    <div class="activity-item">
                      <div>
                        <div class="activity-meta"><span x-text="timeAgo(g.created_at)"></span></div>
                        <div x-text="g.message"></div>
                      </div>
                      <button class="btn btn-outline btn-sm btn-danger" @click="deleteGuestbookEntry(g.entry_id)">Delete</button>
                    </div>
                  </template>
                </div>

                <div x-show="activityTab === 'testimonials' && !activityLoading">
                  <template x-if="activityData.testimonials.length === 0"><p class="text-muted">No testimonials yet.</p></template>
                  <template x-for="t in activityData.testimonials" :key="t.testimonial_id">
                    <div class="activity-item">
                      <div>
                        <div class="activity-meta">
                          <span class="settings-badge" :class="t.status" x-text="t.status"></span>
                          · <span x-text="timeAgo(t.created_at)"></span>
                        </div>
                        <div x-text="t.body"></div>
                      </div>
                    </div>
                  </template>
                </div>
              </section>

              <hr class="settings-divider">

              <!-- ACCOUNT -->
              <section id="settings-account" class="settings-section">
                <h2>Account</h2>
                <p class="subtitle">Session and account management</p>
                <div class="connection-card" style="margin-bottom:1.5rem;">
                  <div>
                    <strong>Sign out</strong>
                    <div class="text-muted" style="font-size:0.78rem;">Sign out of this device</div>
                  </div>

                  <input type="text" x-model="deleteConfirmation" placeholder="Type DELETE to confirm"
                         style="margin-bottom:0.75rem;">
                  <template x-if="deleteError"><div class="settings-toast error" x-text="deleteError"></div></template>
                  <button class="btn btn-danger" @click="deleteAccount()" :disabled="deleting"
                          x-text="deleting ? 'Deleting...' : 'Delete My Account'"></button>
                </div>
              </section>
